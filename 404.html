<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>404 - Page Not Found</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;900&family=Geist:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --font-heading: 'Bricolage Grotesque', system-ui, sans-serif;
      --font-body: 'Geist', system-ui, sans-serif;
      --color-font-body: #272c35;
      --background-color: #f2e6d9;
      --background-soft: #efe2d2;
      --soft-color: #272c35;
      --primary-yellow: #d19a1a;
      --hairline-color: #3f4550;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: var(--font-body);
      color: var(--color-font-body);
      background-color: var(--background-color);
      background-image: url("images/projects/personal/backgound-1.png");
      background-size: cover;
      background-position: center;
      overflow: hidden;
    }

    .error-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      text-align: center;
    }

    .error-card {
      width: min(900px, 100%);
      padding: clamp(2rem, 5vw, 4rem);
      background: rgba(242, 230, 217, 0.78);
      border: 1px solid rgba(63, 69, 80, 0.2);
      backdrop-filter: blur(8px);
    }

    .error-kicker {
      margin-bottom: 1rem;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--primary-yellow);
    }

    .error-title {
      font-family: var(--font-heading);
      font-size: clamp(5rem, 22vw, 14rem);
      font-weight: 900;
      line-height: 0.8;
      letter-spacing: -0.08em;
      text-transform: uppercase;
    }

    .error-message {
      max-width: 620px;
      margin: 2rem auto 0;
      font-size: clamp(1.2rem, 3vw, 2rem);
      font-family: var(--font-heading);
      font-weight: 600;
      line-height: 1.15;
    }

    .error-copy {
      max-width: 520px;
      margin: 1rem auto 0;
      font-size: 1rem;
      line-height: 1.6;
      color: rgba(39, 44, 53, 0.78);
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin: 2.5rem 0 1rem;
    }

    #preloader-logo {
      width: min(190px, 45vw);
      animation: bounceLogo 1.4s ease-in-out infinite,
                 colorShift 5s ease-in-out infinite;
    }

    @keyframes bounceLogo {
      0%, 100% {
        transform: translateY(0) scale(1);
      }

      50% {
        transform: translateY(-18px) scale(1.03);
      }
    }

    @keyframes colorShift {
      0%, 100% {
        filter: hue-rotate(0deg) saturate(1);
      }

      50% {
        filter: hue-rotate(80deg) saturate(1.25);
      }
    }

    .error-actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-top: 2rem;
    }

    .error-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.85rem 1.3rem;
      border: 1px solid var(--primary-yellow);
      background: var(--primary-yellow);
      color: var(--color-font-body);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      transition: transform 0.25s ease, background 0.25s ease, color 0.25s ease;
    }

    .error-btn:hover {
      transform: translateY(-3px);
      background: transparent;
      color: var(--primary-yellow);
    }

    .error-link {
      border-color: rgba(63, 69, 80, 0.3);
      background: transparent;
      color: var(--soft-color);
    }

    .error-link:hover {
      border-color: var(--primary-yellow);
      color: var(--primary-yellow);
    }

    @media (max-width: 600px) {
      body {
        overflow: auto;
      }

      .error-card {
        padding: 2rem 1.25rem;
      }

      .error-title {
        letter-spacing: -0.04em;
      }
    }
  </style>
</head>

<body>
  <main class="error-page">
    <section class="error-card">
      <p class="error-kicker">Page not found</p>

      <h1 class="error-title">404</h1>

      <h2 class="error-message">
        This page wandered off the layout.
      </h2>

      <p class="error-copy">
        The link may be broken, unfinished, or moved. You can return home and keep exploring the portfolio.
      </p>

      <div class="logo-wrap">
        <img src="images/logo-color.png" alt="Gretel Alvarez Tang logo" id="preloader-logo">
      </div>

      <div class="error-actions">
        <a href="index.html" class="error-btn">Go Back Home</a>
        <a href="projects.html" class="error-btn error-link">View Projects</a>
      </div>
    </section>
  </main>
</body>
</html>
