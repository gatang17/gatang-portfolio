<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Portfolio</title>

    <!-- Bootstrap 5 CSS -->
    <link      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"      rel="stylesheet"  />

    <!-- FontAwesome -->
    <script      src="https://kit.fontawesome.com/8fb3a30aab.js"      crossorigin="anonymous"    ></script>

    <!-- Custom CSS -->   
     <link rel="stylesheet" href="styles.css" /> 
      </head>

  <body>
    <!-- HEADER -->
    <header class="row justify-content-between py-3 mx-2">
      <div id="header-container"></div>
    </header>

    <section id="aboutme" class="content">
        <div  class="t-border">
          <h2  class="title">About Me</h2> 
            
        </div>
        <div style="display: flex;justify-items: flex-end; justify-content: flex-end; align-items: flex-end; align-content: flex-end; padding: 3rem;">
            <div class="" style="max-width: 500px; max-height: fit-content!important; padding: 0rem;">
                <h2 class="h_type">  Hi, Im Gretel </h2>
               
                <p>Hi, I'm Gretel! Here's a little about me: I love design and photography. They aren't my major, but I really enjoy creating things that can catch people's interest and make them think.</p>
            </div> 
             </div> 
        
        <div class="container-custom">
            
            <div class="main-box" id="display-box">
                
                </div>
          
            <div class="sidebar" id="sidebar">
               
            </div>
            
          </div>
    
    </section>
    <style>
        /*=================================================RESUME*/
.container-custom {
    display: flex;
  flex-wrap: wrap; 
  gap: 30px;             /* espacio entre items */
  justify-content: flex-start; 
  padding: 3rem;
}

/* MAIN */
.main-box {
  width: 60%;
  min-height: 400px;
  padding: 15px;
}

.main-box img {
  width: 100%;
  display: block;
  flex: 0 0 auto;
}

.description {
  margin-top: 15px;
}

/* SIDEBAR */
.sidebar {
  width: 35%;
  display: flex;
  flex-direction: column;
  gap: 12px;
  flex: 0 0 auto;
}

/* CATEGORY */
.category {


  overflow: hidden;
}

/* HEADER */
.cat-header {
    border-bottom: solid #a9a483;;
  display: flex;
  justify-content: space-between;
  padding: 10px;
  cursor: pointer;
  font-weight: bold;
}

/* PLUS ROTATION */
.plus {
  transition: transform 0.3s ease;
}

.category.open .plus {
  transform: rotate(45deg); /* + → × */
}

/* ITEMS (ANIMACIÓN REAL) */
.items {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
  display: flex;
  flex-direction: column;
}

/* CUANDO ABRE */
.category.open .items {
  max-height: 2000px; /* suficiente para contenido */
}

/* ITEM */
.item {
  padding: 8px 10px;
  min-height: 80px;
  cursor: pointer;
  transition: background 0.2s;
}

.item:hover {
  background: #a9a483;
}

/* ACTIVO */
.item.active {
    color: #a9a483;
    background-color: #2f2f2f;
}
@media (max-width: 768px) {
  .main-box,
  .sidebar {
    width: 100%; /* ocupa toda la fila */
  }

  .container-custom {
    justify-content: center; /* opcional, centra items si son más estrechos */
  }
}
</style>

    </script>
    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
   <script src="js/script.js"></script> 
    <div id="footer-container"></div>
  </body>
</html>
